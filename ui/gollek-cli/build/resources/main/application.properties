quarkus.banner.enabled=false
# Clean CLI output
quarkus.log.console.enabled=false
quarkus.log.console.json=false
quarkus.log.console.json.enabled=false
quarkus.log.json=false
quarkus.log.console.level=WARN
quarkus.log.console.format=%s%e%n

# Suppress configuration warnings about unused keys
quarkus.log.category."io.quarkus.config".level=ERROR
quarkus.log.category."io.quarkus.runtime.logging.LoggingSetupRecorder".level=ERROR

# Suppress SLF4J warnings about multiple providers
quarkus.log.category."org.slf4j".level=ERROR

# Silence noisy loggers
quarkus.log.category."io.micrometer.core.instrument".level=ERROR
quarkus.log.category."tech.kayys.gollek.engine.plugin.GollekPluginRegistry".level=ERROR

# Redirect logs to a file in the background (can be disabled for sandboxed runs)
quarkus.log.file.enabled=${GOLLEK_CLI_FILE_LOG_ENABLED:true}
quarkus.log.file.path=${GOLLEK_CLI_LOG_FILE:${gollek.home:${user.home}/.gollek}/logs/gollek.log}
quarkus.log.file.level=DEBUG
quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{2.}] %s%e%n
quarkus.log.file.json=true
quarkus.log.file.json.pretty-print=false

quarkus.log.level=INFO
quarkus.log.category."tech.kayys.gollek".level=WARN
quarkus.log.category."tech.kayys.gollek.engine.service.AsyncJobManager".level=WARN
quarkus.log.category."tech.kayys.gollek.engine.service.StartupInitializer".level=WARN
quarkus.log.category."tech.kayys.gollek.sdk".level=WARN
quarkus.log.category."tech.kayys.gollek.engine.inference.InferenceService".level=OFF
quarkus.log.category."tech.kayys.gollek.engine.routing.ModelRouterService".level=ERROR
quarkus.log.category."io.quarkus".level=WARN
quarkus.log.category."tech.kayys.gollek.inference.libtorch".level=WARN

# Enable DEBUG logging for SafeTensor device placement (file-only, console suppressed)
quarkus.log.category."tech.kayys.gollek.safetensor.engine.generation.DirectInferenceEngine".level=DEBUG
quarkus.log.category."tech.kayys.gollek.cli.commands.ChatCommand".level=WARN

