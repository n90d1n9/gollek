quarkus.index-dependency.gollek-model-qwen.artifact-id=gollek-model-qwen

# Suppress unknown config key validation
smallrye.config.mapping.validate-unknown=false

# Disable all Dev Services during tests
quarkus.devservices.enabled=false

# Dummy storage configuration for tests
inference.model-storage.gcs.project-id=dummy
inference.model-storage.s3.secret-access-key=dummy
inference.model-storage.azure.connection-string=dummy
inference.model-storage.s3.access-key-id=dummy
inference.model-storage.s3.endpoint=dummy

# Internal Default Configuration
gollek.models.auto-download-enabled=true
gollek.models.default-model=Qwen/Qwen2.5-0.5B-Instruct
gollek.models.default-provider=native
Wayang.inference.repository.huggingface.auto-download=true

# ── Demo / Community defaults ─────────────────────────────────────────────────
# RAG: lightweight LLM and embedding models
gollek.rag.default-llm-model=${GOLLEK_RAG_LLM_MODEL:Qwen/Qwen2.5-0.5B-Instruct}
gollek.rag.default-embedding-model=${GOLLEK_RAG_EMBEDDING_MODEL:sentence-transformers/all-MiniLM-L6-v2}

# Audio: smallest Whisper variant by default 
gollek.audio.whisper.default-model=${GOLLEK_WHISPER_MODEL:openai/whisper-tiny}

# Optional tokens – by default 'none' for public/local access to satisfy mandatory config checks
gollek.hub.token=none
gollek.admin.api-key=none
# ─────────────────────────────────────────────────────────────────────────────

# Package as Uber-JAR (Build-time property)
quarkus.package.jar.enabled=true
quarkus.package.jar.type=uber-jar
quarkus.package.jar.add-runner-suffix=false
quarkus.package.output-name=gollek

# Enable GGUF provider for local execution
gguf.provider.enabled=true
gguf.provider.prewarm.enabled=true
gguf.provider.model.base-path=${GOLLEK_HOME:${gollek.home:${user.home}/.gollek}}/models/gguf
gguf.provider.native.library-dir=${GOLLEK_LLAMA_LIB_DIR:}
gguf.provider.native.library-path=${GOLLEK_LLAMA_LIB_PATH:}
gguf.provider.gpu.enabled=${GGUF_GPU_ENABLED:true}
gguf.provider.gpu.layers=${GGUF_GPU_LAYERS:8}
gguf.provider.max-context-tokens=${GGUF_MAX_CONTEXT_TOKENS:2048}
gguf.provider.batch-size=${GGUF_BATCH_SIZE:64}
gguf.provider.threads=${GGUF_THREADS:8}

libtorch.provider.enabled=true
libtorch.provider.model.base-path=${GOLLEK_HOME:${gollek.home:${user.home}/.gollek}}/models/libtorchscript
libtorch.provider.model.extensions=.pt,.pts,.jit,.ts
libtorch.provider.native-lib.library-path=${GOLLEK_LIBTORCH_LIB_PATH:${GOLLEK_HOME:${gollek.home:${user.home}/.gollek}}/source/vendor/libtorch/lib}


# Transformers provider configuration
transformers.provider.timeout-seconds=120

# Litert (TF Lite) provider configuration
litert.provider.model.base-path=${GOLLEK_HOME:${gollek.home:${user.home}/.gollek}}/models/litert
litert.provider.threads=4
litert.provider.gpu.enabled=false
litert.provider.timeout=PT30S

# MCP Plugin configuration
wayang.inference.mcp.enabled=true
wayang.inference.mcp.default-timeout=30s
wayang.inference.mcp.tools-enabled=true
wayang.inference.mcp.resources-enabled=true
wayang.inference.mcp.prompts-enabled=true
wayang.inference.mcp.cache.enabled=true
wayang.inference.mcp.cache.max-size=1000
wayang.inference.mcp.cache.ttl=15m

# Use local Caffeine cache instead of Redis for CLI
quarkus.cache.type=caffeine

# Disable Redis entirely to avoid CDI activation issues
quarkus.redis.active=false
quarkus.redis.devservices.enabled=false



# ── Safetensor Loader ─────────────────────────────────────────────────────────
# In JDK 25 native image, ALL mmap paths (FileChannel.map + MappedByteBuffer)
# use SharedArena internally, which conflicts with -H:+VectorAPISupport.
# Native image must use the copy path (reads into Arena.ofAuto() off-heap).
%native.gollek.safetensor.loader.prefer-mmap=false

# Dummy provider keys with environment variable fallbacks
gollek.provider.cerebras.api-key=${CEREBRAS_API_KEY:dummy}
gollek.provider.gemini.api-key=${GEMINI_API_KEY:dummy}
gollek.provider.mistral.api-key=${MISTRAL_API_KEY:dummy}
gollek.provider.openai.api-key=${OPENAI_API_KEY:dummy}
gollek.provider.anthropic.api-key=${ANTHROPIC_API_KEY:dummy}



# REST Client URLs for providers
quarkus.rest-client.cerebras-api.url=https://api.cerebras.ai

quarkus.rest-client.gemini-api.url=https://generativelanguage.googleapis.com


# Enable native access for Panama FFM
quarkus.native.additional-build-args[0]=--enable-native-access=ALL-UNNAMED
quarkus.native.additional-build-args[1]=-H:+ReportExceptionStackTraces
quarkus.native.additional-build-args[2]=-H:+AddAllCharsets
quarkus.native.additional-build-args[3]=-H:+UnlockExperimentalVMOptions
quarkus.native.additional-build-args[4]=-H:+VectorAPISupport
quarkus.native.additional-build-args[5]=--initialize-at-run-time=org.jline.nativ.Kernel32$MENU_EVENT_RECORD
quarkus.native.additional-build-args[6]=--initialize-at-run-time=org.jline.nativ.Kernel32$FOCUS_EVENT_RECORD
quarkus.native.additional-build-args[7]=--initialize-at-run-time=org.jline.nativ.Kernel32$INPUT_RECORD
quarkus.native.additional-build-args[8]=--initialize-at-run-time=org.jline.nativ.Kernel32$COORD
quarkus.native.additional-build-args[9]=--initialize-at-run-time=org.jline.nativ.Kernel32$KEY_EVENT_RECORD
quarkus.native.additional-build-args[10]=--initialize-at-run-time=org.jline.nativ.Kernel32$MOUSE_EVENT_RECORD
quarkus.native.additional-build-args[11]=--initialize-at-run-time=org.jline.nativ.Kernel32$WINDOW_BUFFER_SIZE_RECORD
quarkus.native.additional-build-args[12]=--initialize-at-run-time=org.jline.nativ.Kernel32$CONSOLE_SCREEN_BUFFER_INFO
quarkus.native.additional-build-args[13]=--initialize-at-run-time=org.jline.nativ.Kernel32$SMALL_RECT
quarkus.native.additional-build-args[14]=--initialize-at-run-time=org.jline.nativ.Kernel32$CHAR_INFO
quarkus.native.additional-build-args[15]=--initialize-at-run-time=org.jline.nativ.Kernel32
quarkus.native.additional-build-args[16]=--initialize-at-run-time=tech.kayys.gollek.inference.libtorch.core.TorchTensor
quarkus.native.additional-build-args[17]=--initialize-at-run-time=tech.kayys.gollek.inference.libtorch.core.TorchTensor$CleanerHolder
quarkus.native.additional-build-args[18]=-H:-SharedArenaSupport
quarkus.native.additional-build-args[19]=--initialize-at-run-time=tech.kayys.suling,tech.kayys.gollek.metal.binding.MetalBinding,tech.kayys.gollek.safetensor.core.tensor.AccelOps,tech.kayys.gollek.safetensor.core.tensor.AccelTensor,tech.kayys.gollek.safetensor.audio.processing.FlacDecoder,tech.kayys.gollek.safetensor.audio.processing.AudioDecoderRegistry,tech.kayys.gollek.spi.tensor.ComputeKernelRegistry,tech.kayys.gollek.spi.tensor.CpuKernel,tech.kayys.gollek.llama.llama_h,tech.kayys.gollek.inference.llamacpp.LlamaNativeLoader,io.smallrye.health.SmallRyeHealthReporter
quarkus.native.additional-build-args[20]=--enable-preview
quarkus.native.additional-build-args[21]=-J--enable-preview
quarkus.native.additional-build-args[22]=--add-modules=jdk.incubator.vector
quarkus.native.additional-build-args[23]=-J--add-modules=jdk.incubator.vector
quarkus.native.additional-build-args[24]=--trace-object-instantiation=java.lang.ref.Cleaner
quarkus.native.native-image-xmx=8g

# If your native lib is packaged inside the app
quarkus.native.resources.includes=**/*.so,**/*.dll,**/*.dylib,native-libs/**


# Faster startup, smaller image
# UPX compression disabled - not supported on macOS
# quarkus.native.compression.disable=true
# quarkus.native.strip-debug-symbols=true

# If using Reactor / Mutiny workers
quarkus.thread-pool.max-threads=32


# Enable HTTP server binding for CLI to prevent port conflicts
quarkus.http.host-enabled=false

# GGUF native library configuration
# Specifies the explicit path to the libgguf_bridge.dylib/.so/.dll native library
# If not set, the library will be loaded from: 
#   1. Extracted JAR resources (~/.gollek/libs/gguf_bridge/1.0.0/)
#   2. Standard installation (~/.gollek/libs/gguf_bridge/1.0.0/)
#   3. Build directory (development mode)
#   4. System library path
gollek.gguf.native.library.path=${GOLLEK_GGUF_NATIVE_LIB_PATH:}

# GGUF native library directory (alternative to explicit path)
# If set, the loader will look for the library in this directory
gollek.gguf.native.library.dir=${GOLLEK_GGUF_NATIVE_LIB_DIR:}

# Disable Observability exporters to prevent 30s shutdown delay
# Keep extensions enabled to satisfy CDI injections
quarkus.otel.metrics.exporter=none
quarkus.otel.logs.exporter=none
quarkus.otel.traces.exporter=none
quarkus.micrometer.export.prometheus.enabled=false

# Snappy shutdown
quarkus.shutdown.timeout=1s
