# =============================================================================
# Gollek Prompt Cache — Reference Configuration
# gollek-prompt-cache module
# =============================================================================
# Copy this file to your deployment's application.properties and adjust.
# All properties have safe defaults; only override what you need.
# =============================================================================

# -----------------------------------------------------------------------------
# Core
# -----------------------------------------------------------------------------

# Enable/disable the entire prompt-cache subsystem.
# When false, a no-op store is used — zero overhead.
gollek.cache.prompt.enabled=true

# Storage strategy.
# Options: in-process (default) | redis | disk | noop
# - in-process : Caffeine heap cache; best for single-JVM standalone JAR.
# - redis       : Distributed; share cache across multiple Gollek instances.
# - disk        : mmap/RocksDB; survives restarts; warm-on-startup capable.
# - noop        : Always miss; useful for benchmarking or disabling selectively.
gollek.cache.prompt.strategy=in-process

# Cache namespace scope.
# Options: global (default) | model | session
# - global  : All models and users share one cache namespace.
# - model   : Separate namespace per model ID (good for multi-model deployments).
# - session : Separate namespace per user session (for session-specific caching).
gollek.cache.prompt.scope=global

# Minimum token count for a prompt prefix to be eligible for caching.
# Prompts shorter than this are not cached (not worth the overhead).
# Increase to 128+ for production to avoid polluting cache with short prompts.
gollek.cache.prompt.min-cacheable-tokens=64

# -----------------------------------------------------------------------------
# Eviction
# -----------------------------------------------------------------------------

# Maximum number of entries in the cache (used by in-process strategy).
gollek.cache.prompt.max-entries=4096

# Hard cap on total tokens across all cached entries (in-process, weighted eviction).
# Default 512K tokens. When exceeded, eviction runs regardless of TTL.
gollek.cache.prompt.max-total-tokens=524288

# Time-to-live per entry. ISO-8601 duration format.
# PT0S = no TTL (rely on size-based eviction only).
# Recommended: PT30M for active deployments; PT2H for stable system-prompt caches.
gollek.cache.prompt.ttl=PT30M

# Eviction policy for the in-process strategy.
# Options: lru (default) | lfu | ttl-only
# - lru      : Least-recently-used size cap. Good general default.
# - lfu      : Least-frequently-used weighted by token count. Better for skewed access patterns.
# - ttl-only : No size cap; TTL drives all eviction. Only use with bounded workloads.
gollek.cache.prompt.eviction-policy=lru

# -----------------------------------------------------------------------------
# In-Process strategy (Caffeine)
# -----------------------------------------------------------------------------

# Initial capacity hint for the Caffeine cache table.
gollek.cache.prompt.in-process.initial-capacity=256

# Record detailed Caffeine stats (hit count, miss count, evictions).
# Slight overhead (~5ns per op); recommended true unless benchmarking raw throughput.
gollek.cache.prompt.in-process.record-stats=true

# -----------------------------------------------------------------------------
# Redis strategy
# -----------------------------------------------------------------------------

# Comma-separated list of Redis host:port pairs.
# Supports standalone, Sentinel (redis-sentinel://...), and Cluster URLs.
gollek.cache.prompt.redis.hosts=localhost:6379

# Key prefix prepended to all Redis keys.
gollek.cache.prompt.redis.key-prefix=gollek:pc:

# Maximum connections in the Redis connection pool.
gollek.cache.prompt.redis.max-total-connections=16

# Timeout for synchronous Redis reads (ISO-8601).
gollek.cache.prompt.redis.read-timeout=PT1S

# Write cache metadata to Redis asynchronously (fire-and-forget).
# Recommended true: eliminates Redis write latency from the inference hot path.
# Set false only if you need strict read-your-writes consistency.
gollek.cache.prompt.redis.async-writes=true

# Serialization format for cache entry metadata stored in Redis.
# Options: json (default) | cbor (more compact, requires jackson-dataformat-cbor)
gollek.cache.prompt.redis.serializer=json

# -----------------------------------------------------------------------------
# Disk strategy (mmap / RocksDB)
# -----------------------------------------------------------------------------

# Directory for the on-disk cache file(s).
# Must be writable by the Gollek process. Created if it does not exist.
gollek.cache.prompt.disk.path=/var/gollek/prompt-cache

# Disk backend implementation.
# Options: mmap (default) | rocksdb
# - mmap    : Simple memory-mapped append-only file. Low overhead; good for <=4GB caches.
# - rocksdb : RocksJava. Compaction, bloom filters, range deletes. Best for large caches.
gollek.cache.prompt.disk.backend=mmap

# Maximum disk file size in megabytes. Compaction triggers at 90% of this value.
gollek.cache.prompt.disk.max-size-mb=4096

# Force fsync after every write. Safe but slow. Default false = rely on OS page cache.
gollek.cache.prompt.disk.sync-on-write=false

# -----------------------------------------------------------------------------
# Advanced
# -----------------------------------------------------------------------------

# Hash algorithm for prefix fingerprinting.
# Options: xxhash64 (default, fastest) | murmur3 | rolling-poly (zero-dependency)
gollek.cache.prompt.hash-algo=xxhash64

# Pre-warm the cache from disk on startup.
# For in-process/redis: loads the companion disk snapshot at disk.path.
# For disk: index is rebuilt automatically from the data file.
gollek.cache.prompt.warm-on-startup=false

# Comma-separated list of model IDs to warm on startup. Empty = warm all found models.
gollek.cache.prompt.warm-model-ids=

# Write new cache entries asynchronously on a background thread.
# Recommended true: keeps the inference response streaming path free of store latency.
gollek.cache.prompt.async-store=true
