# ============================================================================
# Gollek Optimization Plugins Configuration
# ============================================================================
# 
# All optimization plugins can be enabled/disabled individually.
# By default, ALL optimizations are ENABLED for maximum performance.
#
# Usage: Copy this to your application.properties and modify as needed.
# ============================================================================

# ──────────────────────────────────────────────────────────────────────────
# Core Optimizations (Highest Impact)
# ──────────────────────────────────────────────────────────────────────────

## PagedAttention - VLLM-style paged KV cache (10-24x throughput improvement)
gollek.optimizations.paged-attention.enabled=true
gollek.optimizations.paged-attention.priority=10
gollek.optimizations.paged-attention.blockSize=16
gollek.optimizations.paged-attention.totalBlocks=2048

## KV Cache - Multi-turn conversation support
gollek.optimizations.kv-cache.enabled=true
gollek.optimizations.kv-cache.priority=20
gollek.optimizations.kv-cache.evictionPolicy=LRU
gollek.optimizations.kv-cache.maxSequenceLength=32768

## Continuous Batching - Dynamic batch sizing
gollek.optimizations.continuous-batching.enabled=true
gollek.optimizations.continuous-batching.priority=15
gollek.optimizations.continuous-batching.maxBatchSize=256
gollek.optimizations.continuous-batching.scheduleIntervalMs=10

# ──────────────────────────────────────────────────────────────────────────
# Attention Optimizations
# ──────────────────────────────────────────────────────────────────────────

## FlashAttention - Memory-efficient attention
gollek.optimizations.flash-attention.enabled=true
gollek.optimizations.flash-attention.priority=5
gollek.optimizations.flash-attention.deviceFilter=cuda,metal,rocm
gollek.optimizations.flash-attention.minSeqLen=512

## FlashAttention-3 - Hopper+ GPUs only (2-3x faster)
gollek.optimizations.fa3.enabled=true
gollek.optimizations.fa3.priority=3
gollek.optimizations.fa3.deviceFilter=cuda
gollek.optimizations.fa3.minComputeCapability=90

## FlashAttention-4 - Next-gen (Blackwell/Metal)
gollek.optimizations.fa4.enabled=true
gollek.optimizations.fa4.priority=2
gollek.optimizations.fa4.deviceFilter=cuda,metal
gollek.optimizations.fa4.minComputeCapability=100

## Hybrid Attention - Mix of standard and optimized
gollek.optimizations.hybrid-attention.enabled=true
gollek.optimizations.hybrid-attention.priority=30
gollek.optimizations.hybrid-attention.deviceFilter=cuda

# ──────────────────────────────────────────────────────────────────────────
# Memory Optimizations
# ──────────────────────────────────────────────────────────────────────────

## Prompt Cache - Cache system prompts (5-10x speedup for repeated prompts)
gollek.optimizations.prompt-cache.enabled=true
gollek.optimizations.prompt-cache.priority=25
gollek.optimizations.prompt-cache.maxPrompts=1000
gollek.optimizations.prompt-cache.ttlMinutes=60

## EvicPress - KV cache compression
gollek.optimizations.evicpress.enabled=true
gollek.optimizations.evicpress.priority=35
gollek.optimizations.evicpress.deviceFilter=cuda,metal

## Weight Offload - Offload weights to CPU for large models
gollek.optimizations.weight-offload.enabled=false
gollek.optimizations.weight-offload.priority=55
gollek.optimizations.weight-offload.offloadTo=cpu

# ──────────────────────────────────────────────────────────────────────────
# Performance Modes
# ──────────────────────────────────────────────────────────────────────────

## Performance Mode - Tuned for latency or throughput
gollek.optimizations.perf-mode.enabled=true
gollek.optimizations.perf-mode.priority=40
gollek.optimizations.perf-mode.mode=balanced
# Options: latency, throughput, balanced

## Prefill-Decode Split - Separate kernels for prefill and decode
gollek.optimizations.prefill-decode.enabled=true
gollek.optimizations.prefill-decode.priority=45
gollek.optimizations.prefill-decode.deviceFilter=cuda

# ──────────────────────────────────────────────────────────────────────────
# Scheduling Optimizations
# ──────────────────────────────────────────────────────────────────────────

## Wait Scheduler - Async scheduling optimization
gollek.optimizations.wait-scheduler.enabled=true
gollek.optimizations.wait-scheduler.priority=50

# ──────────────────────────────────────────────────────────────────────────
# Training/Fine-tuning Optimizations
# ──────────────────────────────────────────────────────────────────────────

## QLoRA - Quantized Low-Rank Adaptation
gollek.optimizations.qlora.enabled=false
gollek.optimizations.qlora.priority=60
gollek.optimizations.qlora.rank=16
gollek.optimizations.qlora.alpha=32

## Elastic Expert Parallel - Distributed training
gollek.optimizations.elastic-ep.enabled=false
gollek.optimizations.elastic-ep.priority=65
gollek.optimizations.elastic-ep.deviceFilter=cuda,rocm
